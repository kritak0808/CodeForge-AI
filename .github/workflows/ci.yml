name: CodeForge AI - Monorepo CI/CD

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  # 1. Lint and Test JS/TS modules (pnpm & Next.js)
  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8
        
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        
    - name: Install Node Dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Run ESLint
      run: pnpm run lint
      
    - name: Run Frontend Tests
      run: pnpm run test

  # 2. Lint and Test Python Services (Poetry)
  python-ci:
    name: Python CI (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [
          'apps/api',
          'apps/agent-orchestrator',
          'apps/agent-workers',
          'apps/approval-service',
          'apps/notification-service',
          'packages/shared-memory',
          'packages/shared-llm'
        ]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true
        
    - name: Cache Poetry dependencies
      uses: actions/cache@v4
      with:
        path: ${{ matrix.service }}/.venv
        key: ${{ runner.os }}-poetry-${{ matrix.service }}-${{ hashFiles(format('{0}/pyproject.toml', matrix.service)) }}
        
    - name: Install Python Dependencies
      working-directory: ${{ matrix.service }}
      run: poetry install --no-interaction
      
    - name: Run Ruff Linter
      working-directory: ${{ matrix.service }}
      run: |
        poetry run pip install ruff
        poetry run ruff check .
        
    - name: Run PyTest Suite
      working-directory: ${{ matrix.service }}
      run: |
        poetry run pip install pytest
        poetry run pytest

  # 3. Security Scanning Job
  security-scanning:
    name: Security Scan (Trivy & Secrets)
    needs: [frontend-ci, python-ci]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Gitleaks Secret Scanner
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Run Trivy Config Vulnerability Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        hide-progress: false
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

  # 4. Build and Push Docker Images
  docker-build-push:
    name: Build & Push Images
    needs: [security-scanning]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [
          { name: 'codeforge-web', path: 'apps/web', file: 'apps/web/Dockerfile' },
          { name: 'codeforge-api', path: 'apps/api', file: 'infrastructure/docker/Dockerfile.api' },
          { name: 'codeforge-orchestrator', path: 'apps/agent-orchestrator', file: 'infrastructure/docker/Dockerfile.orchestrator' },
          { name: 'codeforge-workers', path: 'apps/agent-workers', file: 'infrastructure/docker/Dockerfile.workers' },
          { name: 'codeforge-approval', path: 'apps/approval-service', file: 'infrastructure/docker/Dockerfile.approval' },
          { name: 'codeforge-notification', path: 'apps/notification-service', file: 'infrastructure/docker/Dockerfile.notification' }
        ]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine Docker Tags
      id: meta
      run: |
        BRANCH_TAG="${{ github.ref_name }}"
        if [ "$BRANCH_TAG" = "main" ]; then
          echo "tag=latest" >> $GITHUB_OUTPUT
        else
          echo "tag=$BRANCH_TAG" >> $GITHUB_OUTPUT
        fi

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ matrix.image.file }}
        push: ${{ github.event_name == 'push' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ steps.meta.outputs.tag }}
          ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 5. Helm & Kubernetes Manifest Validation
  helm-validation:
    name: Helm Manifest Lint & Dry-run
    needs: [docker-build-push]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.12.0

    - name: Helm Lint
      run: |
        helm lint infrastructure/kubernetes/codeforge-chart

    - name: Helm Template (Dry-run Compilation)
      run: |
        helm template codeforge-release infrastructure/kubernetes/codeforge-chart \
          --values infrastructure/kubernetes/codeforge-chart/values.yaml

  # 6. Deploy to Staging Environment
  deploy-staging:
    name: Deploy to Staging
    needs: [helm-validation]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update EKS Kubeconfig
      run: |
        aws eks update-kubeconfig --name codeforge-staging-eks --region us-east-1

    - name: Deploy Helm Chart
      run: |
        helm upgrade --install codeforge-staging infrastructure/kubernetes/codeforge-chart \
          --namespace codeforge-staging --create-namespace \
          --values infrastructure/kubernetes/codeforge-chart/values.yaml \
          --set image.tag=${{ github.sha }}

    - name: Rollback on Failure
      if: failure()
      run: |
        echo "Deployment failed! Rolling back to last stable release..."
        helm rollback codeforge-staging --namespace codeforge-staging

  # 7. Deploy to Production Environment
  deploy-production:
    name: Deploy to Production
    needs: [helm-validation]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update EKS Kubeconfig
      run: |
        aws eks update-kubeconfig --name codeforge-prod-eks --region us-east-1

    - name: Deploy Helm Chart
      run: |
        helm upgrade --install codeforge-production infrastructure/kubernetes/codeforge-chart \
          --namespace codeforge-production --create-namespace \
          --values infrastructure/kubernetes/codeforge-chart/values.yaml \
          --set image.tag=${{ github.sha }}

    - name: Rollback on Failure
      if: failure()
      run: |
        echo "Production deployment failed! Rolling back immediately..."
        helm rollback codeforge-production --namespace codeforge-production

