global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'codeforge-api'
    static_configs:
      - targets: ['codeforge-api:8000']

  - job_name: 'codeforge-approval'
    static_configs:
      - targets: ['codeforge-approval:8001']

  - job_name: 'codeforge-notification'
    static_configs:
      - targets: ['codeforge-notification:8002']
