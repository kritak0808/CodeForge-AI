[project]
name = "shared-llm"
version = "1.0.0"
description = "Unified LLM provider abstraction for CodeForge AI"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.12.0",
    "anthropic>=0.18.0",
    "google-generativeai>=0.3.0",
    "tiktoken>=0.5.0",
    "tenacity>=8.2.0",
    "pydantic>=2.6.4",
    "httpx>=0.25.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
